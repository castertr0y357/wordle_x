version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "0.0.0.0:${BACKEND_PORT:-8000}:8000"
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://mongo:27017}
      - DB_NAME=${DB_NAME:-wordle_x}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      - mongo
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL}
    ports:
      - "0.0.0.0:${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - app-network

  mongo:
    image: mongo:${MONGO_VERSION:-latest}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo_data:
